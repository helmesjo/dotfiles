[terminal.shell]
program = "cmd.exe"
args = [
  "/c",
  """\
"cd %USERPROFILE% && \
  .config\\shortcuts\\msys2_shell.cmd \
    -ucrt64 \
    -defterm \
    -here \
    -no-start \
    -use-full-path \
    -shell \
    zsh --login"
  """
]
# Fix Shift+Enter on Windows
[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001b\u000a"
